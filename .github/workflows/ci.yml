name: Python CI Pipeline

# O pipeline será executado a cada push ou pull request na branch main
on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    # Passo 1: Baixa o código do seu repositório para a máquina do GitHub
    - name: Checkout codigo
      uses: actions/checkout@v4

    # Passo 2: Instala o Python na máquina virtual do GitHub
    - name: Configurar Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12' # Versão estável do Python

    # Passo 3: Instala as dependências do seu projeto
    - name: Instalar dependencias
      run: |
        python -m pip install --upgrade pip
        if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

    # Passo 4: Executa os testes (se você tiver testes configurados)
    - name: Rodar Testes com pytest
      run: |
        # Caso tenha testes com pytest, descomente a linha abaixo:
        # pytest
        echo "Ambiente configurado com sucesso!"